<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaya! — En construcción</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pacifico&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --yellow: #FAD601;
      --blue: #22AFE5;
      --orange: #F08C12;
      --green: #30A037;
      --red: #CD141B;
    }

    html,
    body {
      height: 100%;
      background: var(--white);
      font-family: "Montserrat", sans-serif;
      overflow: hidden;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--black);
      margin-bottom: 60px;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px 40px;
      position: relative;
      overflow: hidden;
    }

    /* ── SHAPES ── */
    .shapes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      animation: float 6s ease-in-out infinite;
    }

    /* Each shape anchored to a corner, sized with clamp so they shrink on mobile */
    .shape-1 {
      top: 4%;
      left: -20px;
      width: clamp(100px, 25vw, 240px);
      animation-delay: 0s;
    }

    .shape-2 {
      bottom: 8%;
      right: -20px;
      width: clamp(90px, 20vw, 200px);
      animation-delay: 1.5s;
    }

    .shape-3 {
      bottom: 6%;
      left: -10px;
      width: clamp(80px, 18vw, 180px);
      animation-delay: 3s;
    }

    .shape-4 {
      top: 4%;
      right: -10px;
      width: clamp(70px, 15vw, 160px);
      animation-delay: 2s;
    }

    .shape svg {
      width: 100%;
      height: auto;
      display: block;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-14px) rotate(5deg);
      }
    }

    /* ── CONTENT ── */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 700px;
      /* horizontal padding keeps text away from corner shapes */
      padding-left: clamp(20px, 5vw, 120px);
      padding-right: clamp(20px, 5vw, 120px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--black);
      color: var(--white);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 36px;
      animation: fadeUp 0.6s ease both;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      background: var(--yellow);
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    .headline {
      font-size: clamp(1.8rem, 5vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--black);
      animation: fadeUp 0.6s 0.1s ease both;
      margin-bottom: 12px;
    }

    .headline .cursive {
      font-family: 'Pacifico', cursive;
      font-weight: 300;
      color: black;
      font-size: 1.15em;
      display: inline-block;
      transform: rotate(-2deg);
      position: relative;
      z-index: 2;
    }

    .underline-doodle {
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 100%;

      position: absolute;
      z-index: -1;
      height: auto;
      display: block;
    }

    .subline {
      font-size: clamp(0.8rem, 1.8vw, 1.1rem);
      font-weight: 400;
      color: var(--black);
      opacity: 0.55;
      margin-top: 20px;
      line-height: 1.6;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-top: 40px;
      animation: fadeUp 0.6s 0.35s ease both;
      flex-wrap: wrap;
    }

    .stat {
      padding: 14px 24px;
      border-left: 1px solid rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .stat:first-child {
      border-left: none;
    }

    .stat-num {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--black);
      display: block;
    }

    .stat-num.highlight {
      color: var(--blue);
    }

    .stat-label {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--black);
      opacity: 0.45;
      display: block;
      margin-top: 2px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--blue), var(--green), var(--orange), var(--red), var(--yellow));
      background-size: 300% 100%;
      animation: slide-gradient 4s linear infinite;
    }

    @keyframes slide-gradient {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 300% 50%;
      }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .hero {
        padding: 60px 16px 50px;
      }

      .logo {
        margin-bottom: 32px;
      }

      .badge {
        margin-bottom: 20px;
        font-size: 0.6rem;
        padding: 5px 12px;
      }

      .stat {
        padding: 10px 14px;
      }

      .stat-num {
        font-size: 1.1rem;
      }

      /* Push shapes further off-screen on very small screens */
      .shape-1 {
        left: -40px;
      }

      .shape-2 {
        right: -40px;
      }

      .shape-3 {
        left: -40px;
      }

      .shape-4 {
        right: -40px;
      }
    }
  </style>
</head>
